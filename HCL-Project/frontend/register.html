<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — UREI</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-body">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo">🏠</div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Join UREI to access property intelligence tools</p>
      </div>

      <div id="auth-flash"></div>

      <form id="register-form" class="auth-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="username">Username</label>
          <input class="auth-input" id="username" name="username" type="text" placeholder="Choose a username" required>
          <p class="auth-field-error" id="error-username"></p>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="email">Email</label>
          <input class="auth-input" id="email" name="email" type="email" placeholder="you@example.com" required>
          <p class="auth-field-error" id="error-email"></p>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <input class="auth-input" id="password" name="password" type="password" placeholder="At least 6 characters" required>
          <p class="auth-field-error" id="error-password"></p>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="password2">Confirm Password</label>
          <input class="auth-input" id="password2" name="password2" type="password" placeholder="Re-enter your password" required>
          <p class="auth-field-error" id="error-password2"></p>
        </div>
        <button type="submit" class="auth-submit">Register</button>
      </form>

      <p class="auth-footer">
        Already have an account?
        <a href="/login">Sign in</a>
      </p>
      <a href="/dashboard.html" class="auth-back">← Back to Dashboard</a>
    </div>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
