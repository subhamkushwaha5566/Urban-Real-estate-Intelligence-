<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — UREI</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-body">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo">🏠</div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your Urban Real Estate Intelligence account</p>
      </div>

      <div id="auth-flash"></div>

      <form id="login-form" class="auth-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="username">Username</label>
          <input class="auth-input" id="username" name="username" type="text" placeholder="Enter your username" required>
          <p class="auth-field-error" id="error-username"></p>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <input class="auth-input" id="password" name="password" type="password" placeholder="Enter your password" required>
          <p class="auth-field-error" id="error-password"></p>
        </div>
        <div class="auth-field auth-field-checkbox">
          <label class="auth-checkbox">
            <input type="checkbox" id="remember_me" name="remember_me">
            <span>Remember me</span>
          </label>
        </div>
        <button type="submit" class="auth-submit">Sign In</button>
      </form>

      <p class="auth-footer">
        Don't have an account?
        <a href="/register">Create one</a>
      </p>
      <a href="/dashboard.html" class="auth-back">← Back to Dashboard</a>
    </div>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
